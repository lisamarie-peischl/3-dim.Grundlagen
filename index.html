<!DOCTYPE html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Development</title>
    <style> 
    body {
        padding: 0; 
        margin: 0;
        background-color: black;}  

    .model-selector {
        display: grid;
        grid-template-columns: max-content auto;
        column-gap: 10px;
        row-gap: 25px;
        align-items: start;
    }

    .model-selector input[type="radio"] {
        appearance: none;
        -webkit-appearance: none;
        width: 19px;
        height: 19px;
        border-radius: 50%;
        border: 1.1px solid #ffffff;
        background: #000000;
        display: grid;
        place-items: center;
        margin: 0;
        align-self: start;
        cursor: pointer;
    }

    .model-selector input[type="radio"]::before {
        content: "";
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #ffffff;
        transform: scale(0);
    }

    .model-selector input[type="radio"]:checked::before {
        transform: scale(1);
    }

    .model-selector label {
        color: white;
        font-family: Helvetica, Arial, sans-serif;
        font-size: 22px;
        line-height: 1.1;
        display: block;
        max-width: 350px;
    }

    .model-selector input[type="radio"]:nth-of-type(1) {
        grid-column: 1;
        grid-row: 1;
        margin-top: 5px;
    }

    .model-selector input[type="radio"]:nth-of-type(2) {
        grid-column: 1;
        grid-row: 2;
        margin-top: 5px;
    }

    .model-selector label:nth-of-type(1) {
        grid-column: 2;
        grid-row: 1;
    }

    .model-selector label:nth-of-type(2) {
        grid-column: 2;
        grid-row: 2;
        margin-left: 0;
    }

    .model-selector label::after {
        display: block;
        margin-top: 6px;
        font-family: Helvetica, Arial, sans-serif;
        font-size: 14px;
        line-height: 1.35;
        font-weight: 400;
        font-style: normal;
        color: #ffffff;
        white-space: pre-line;
    }

    .model-selector label:nth-of-type(1)::after {
        content: "Alle KI-Modelle der jeweiligen Länder";
    }

    .model-selector label:nth-of-type(2)::after {
        content: "KI-Modelle, die:\A- den Stand der Technik verbessert haben\A- stark zitiert wurden\A- über eine Million Nutzer hatten\A- historisch wichtig waren\A- über 1 Mio. USD Entwicklungskosten hatten";
    }
    </style>

    <script src="libs/p5.min.js"></script>
    <script src="libs/p5.dom.min.js"></script>

    <script src="investments.js"></script>
    <script src="AI_models.js"></script>
        <script src="years_slider.js"></script>
    <script src="sketch.js"></script>
</head>

<body>

</body>

</html>
